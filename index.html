<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>完工紀錄 | 示範案場</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F6F2EA;
    --cream-deep: #EFE8DA;
    --ink: #2B2620;
    --ink-soft: #6B6153;
    --clay: #B5643E;
    --clay-deep: #8A4A2C;
    --line: rgba(43,38,32,0.14);
    --line-strong: rgba(43,38,32,0.28);
    --card: #FFFFFF;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Serif TC', serif;
    line-height: 1.7;
  }
  header {
    padding: 3.5rem 6vw 2.5rem;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.14em;
    color: var(--clay-deep);
    text-transform: uppercase;
    margin: 0 0 0.6rem;
  }
  h1 {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-weight: 600;
    font-size: clamp(28px, 4vw, 42px);
    margin: 0 0 0.5rem;
  }
  .sub {
    color: var(--ink-soft);
    font-size: 15px;
    max-width: 60ch;
  }
  main {
    padding: 2.5rem 6vw 5rem;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 2.5rem;
    align-items: start;
  }
  @media (max-width: 860px) {
    main { grid-template-columns: 1fr; }
  }
  .plan-wrap {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1.5rem;
    position: sticky;
    top: 2rem;
  }
  .plan-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    margin: 0 0 0.3rem;
  }
  .plan-hint {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 1rem;
  }
  svg { width: 100%; height: auto; display: block; }
  .room-box { fill: var(--cream-deep); stroke: var(--line-strong); stroke-width: 1; transition: fill 0.15s ease; }
  .room-label { font-family: 'Noto Serif TC', serif; font-size: 12px; fill: var(--ink-soft); }
  .hotspot { cursor: pointer; }
  .hotspot:hover .room-box { fill: #E7DDC7; }
  .hotspot.active .room-box { fill: #E0D3B4; stroke: var(--clay); stroke-width: 1.5; }
  .hotdot {
    fill: var(--clay);
    stroke: var(--cream);
    stroke-width: 2;
    transition: r 0.15s ease, fill 0.15s ease;
  }
  .hotspot:hover .hotdot { fill: var(--clay-deep); }
  .hotspot.active .hotdot { fill: var(--clay-deep); r: 9; }

  .detail {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 2rem;
    min-height: 420px;
  }
  .detail-empty {
    color: var(--ink-soft);
    font-size: 14px;
    text-align: center;
    padding: 4rem 1rem;
  }
  .room-name {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    margin: 0 0 0.3rem;
  }
  .room-date {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 1.5rem;
  }
  .section-label {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--clay-deep);
    margin: 1.5rem 0 0.6rem;
  }
  .section-label:first-of-type { margin-top: 0; }
  .item-list {
    margin: 0;
    padding-left: 1.2rem;
    font-size: 15px;
  }
  .item-list li { margin-bottom: 0.3rem; }

  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.6rem;
  }
  .photo-slot {
    aspect-ratio: 4 / 3;
    border-radius: 3px;
    overflow: hidden;
    background: var(--cream-deep);
    border: 1px dashed var(--line-strong);
    position: relative;
  }
  .photo-slot img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .photo-slot.is-placeholder {
    border-style: dashed;
  }
  .ph-caption {
    position: absolute; left: 6px; bottom: 6px;
    font-size: 11px; color: var(--ink-soft);
    background: rgba(255,255,255,0.85);
    padding: 2px 7px; border-radius: 2px;
  }
  .ph-placeholder-badge {
    display: none;
    position: absolute; right: 6px; top: 6px;
    font-size: 10px; color: var(--clay-deep);
    background: rgba(255,255,255,0.9);
    padding: 2px 7px; border-radius: 2px;
    letter-spacing: 0.04em;
  }
  .photo-slot.is-placeholder .ph-placeholder-badge {
    display: block;
  }
  .video-slot {
    aspect-ratio: 16 / 9;
    border-radius: 3px;
    background: var(--cream-deep);
    border: 1px dashed var(--line-strong);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 6px;
    color: var(--ink-soft);
    font-size: 12px;
    overflow: hidden;
  }
  .video-slot video { width: 100%; height: 100%; object-fit: cover; }

  table.spec {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin-top: 0.4rem;
  }
  table.spec td {
    padding: 0.45rem 0;
    border-top: 1px solid var(--line);
  }
  table.spec td:first-child { color: var(--ink-soft); width: 40%; }
  table.spec td:last-child { text-align: right; }
  .swatch {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: -1px;
    border: 1px solid var(--line-strong);
  }
  .brand-row {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    margin-bottom: 1.4rem;
  }
  .brand-logo {
    height: 88px;
    width: auto;
    display: block;
  }
  .brand-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
</style>
</head>

function photoSlot(photo, roomKey) {
  return `<div class="photo-slot">
    <img src="${photo.src}" alt="${photo.label}" onerror="this.onerror=null; this.src='${ROOM_ILLUSTRATION[roomKey]}'; this.closest('.photo-slot').classList.add('is-placeholder');">
    <span class="ph-caption">${photo.label}</span>
    <span class="ph-placeholder-badge">示意圖</span>
  </div>`;
}

function videoBlock(videoSrc) {
  if (!videoSrc) return "";
  return `
    <p class="section-label">完工影片</p>
    <div class="video-slot">
      <video controls preload="none" poster="">
        <source src="${videoSrc}" type="video/mp4">
      </video>
    </div>`;
}

function renderRoom(key) {
  const r = rooms[key];
  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <p class="room-name">${r.name}</p>
    <p class="room-date">${r.date}</p>

    <p class="section-label">工項</p>
    <ul class="item-list">${r.items.map(i => `<li>${i}</li>`).join('')}</ul>

    <p class="section-label">照片</p>
    <div class="gallery">${r.photos.map(p => photoSlot(p, key)).join('')}</div>

    ${videoBlock(r.video)}

    <p class="section-label">材料細節</p>
    <table class="spec">
      ${r.spec.map(s => `<tr><td>${s.label}</td><td>${s.swatch ? `<span class="swatch" style="background:${s.swatch}"></span>` : ''}${s.value}</td></tr>`).join('')}
    </table>
  `;
}

document.querySelectorAll('.hotspot').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
    el.classList.add('active');
    renderRoom(el.dataset.room);
  });
});
